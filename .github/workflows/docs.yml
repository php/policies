name: Docs

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  pages:
    runs-on: ubuntu-22.04
    steps:
      - name: git checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: pip install sphinx-design sphinxawesome-theme rstfmt
      - name: Check formatting
        run: rstfmt --check -w 80 *.rst
